name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

  ci:
    name: Build & Test
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All matrix legs passed
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Matrix result: ${{ needs.build.result }}"
            exit 1
          fi
